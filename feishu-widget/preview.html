<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Toolbar Preview</title>
<style>
:root{color:#202124;background:#f7f8fa;font-family:Inter,system-ui,sans-serif;font-size:14px}
*{box-sizing:border-box}body{margin:0;min-width:320px;background:#f7f8fa}
.app-shell{min-height:100vh;padding:14px}
.toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;margin:-14px -14px 12px;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:0 0 14px 14px}
.toolbar .title strong{color:#fff;font-size:16px;font-weight:650}
.toolbar .title span{color:rgba(255,255,255,.78);font-size:12px}
.toolbar .icon-button{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.12);color:#fff;width:34px;height:34px;border:1px solid rgba(255,255,255,.28);border-radius:6px;cursor:pointer;font-size:18px}
.toolbar .icon-button:hover{background:rgba(255,255,255,.22)}
.toolbar .primary-button{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.95);color:#5b3cc4;font-weight:650;padding:0 12px;height:34px;border:1px solid rgba(255,255,255,.28);border-radius:6px;cursor:pointer}
.toolbar .primary-button:hover{background:#fff}
.title{display:flex;flex-direction:column;gap:2px}
.panel{display:grid;gap:10px;padding:0}
.card{border:1px solid #e0e0e0;border-radius:8px;background:#fff;padding:16px}
.card p{color:#666;margin:8px 0 0}
</style></head>
<body>
<main class="app-shell">
  <section class="toolbar">
    <div class="title"><strong>AI Video Factory</strong><span>api.aigin3601.online</span></div>
    <button class="icon-button">⚙</button>
    <button class="primary-button">刷新</button>
  </section>
  <div class="card">
    <strong>顶部菜单栏预览</strong>
    <p>渐变紫蓝配色，白色文字 + 半透明按钮，下方带圆角。</p>
  </div>
</main>
</body>
</html>
